<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Contact Us</h1>
</header>

<section class="hero">

<form id="contactForm">

<br><br>

<br><br>

<button type="submit">Send Message</button>

</form>

</section>

<script src="main.js"></script>

</body>
</html>
